<!DOCTYPE html>
<html>
<head>
    <title>TeamForge - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="signin.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <h1>TeamForge</h1>
        </div>
        <div class="welcome-text">
            <h2>Welcome back</h2>
            <p>Sign in to continue to your account</p>
        </div>
        <div class="login-card">
            <form>
                <div class="form-group"><label>Email</label><input type="email" placeholder="your.email@university.edu"></div>
                <div class="form-group"><label>Password</label><input type="password" value="********"></div>
                <div class="form-options">
                    <label class="remember-me"><input type="checkbox"> Remember me</label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <a href="dashboardst.html" style="text-decoration: none;">
                    <button type="button" class="primary-btn">Sign In</button>
                </a>            
            </form>
        </div>
        <p class="footer-text">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
</body>
</html>
