<!DOCTYPE html>
<html>
<head>
    <title>TeamForge - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <h1>TeamForge</h1>
        </div>
        <div class="welcome-text"><h2>Create your account</h2><p>Get started today</p></div>
        <div class="login-card">
            <form>
                <label class="section-label">I am a</label>
                <div class="role-selector">
                    <div class="role-card active"><strong>Student</strong><span>Join teams</span></div>
                    <div class="role-card"><strong>Instructor</strong><span>Advise projects</span></div>
                    <div class="role-card"><strong>Admin</strong><span>Manage platform</span></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>First Name</label><input type="text" placeholder="John"></div>
                    <div class="form-group"><label>Last Name</label><input type="text" placeholder="Doe"></div>
                </div>
                <div class="form-group"><label>University Email</label><input type="email" placeholder="your.email@university.edu"></div>
                <div class="form-group"><label>Password</label><input type="password" value="********"></div>
                <div class="form-group">
                    <label>Department</label>
                    <div class="select-wrapper">
                        <select class="custom-select" required>
                            <option value="" disabled selected>Select Department</option>
                            <option value="cs">Computer Science</option>
                            <option value="eng">Software Engineering</option>
                            <option value="des">Electrical Engineering</option>
                            <option value="bus">Industrial Engineering</option>
                        </select>
                    </div>
                </div>                
                <a href="dashboardst.html" class="primary-btn" style="text-decoration: none; display: block; text-align: center;">
    Create Account
</a>
            </form>
        </div>
        <p class="footer-text">Already have an account? <a href="signin.html">Sign in</a></p>
    </div>
</body>
</html>
